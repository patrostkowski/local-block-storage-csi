apiVersion: v1
kind: Service
metadata:
  name: busybox
spec:
  clusterIP: None
  selector:
    app: busybox
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: busybox
spec:
  serviceName: busybox
  replicas: 3
  selector:
    matchLabels:
      app: busybox
  template:
    metadata:
      labels:
        app: busybox
    spec:
      containers:
        - name: busybox
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              stat /dev/blockdata
              echo "block device ready at $(date) [$(blockdev --getsize64 /dev/blockdata 2>/dev/null || wc -c < /dev/blockdata) bytes]"
              sleep 3600
          volumeDevices:
            - name: data
              devicePath: /dev/blockdata
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        volumeMode: Block
        storageClassName: local-block-storage-csi
        resources:
          requests:
            storage: 1Gi
