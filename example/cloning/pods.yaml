apiVersion: v1
kind: Pod
metadata:
  name: test-from-snap
spec:
  containers:
    - name: test
      image: busybox:1.36
      command: ["sh", "-c", "stat /dev/blockdata && echo 'block device ready at '$(date)' ['$(blockdev --getsize64 /dev/blockdata 2>/dev/null || wc -c < /dev/blockdata)' bytes]' && sleep 3600"]
      volumeDevices:
        - name: data
          devicePath: /dev/blockdata
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: lbsp-test-from-snap
---
apiVersion: v1
kind: Pod
metadata:
  name: test-restore
spec:
  containers:
    - name: test
      image: busybox:1.36
      command: ["sh", "-c", "stat /dev/blockdata && echo 'block device ready at '$(date)' ['$(blockdev --getsize64 /dev/blockdata 2>/dev/null || wc -c < /dev/blockdata)' bytes]' && sleep 3600"]
      volumeDevices:
        - name: data
          devicePath: /dev/blockdata
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: lbsp-test-restore