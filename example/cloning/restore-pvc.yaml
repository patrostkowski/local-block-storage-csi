apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lbsp-test-restore
spec:
  storageClassName: local-block-storage-csi
  volumeMode: Block
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  dataSource:
    kind: PersistentVolumeClaim
    name: lbsp-test-claim
